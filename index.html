<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Friendship Day</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial, sans-serif;
text-align:center;
color:white;
overflow-x:hidden;

background:linear-gradient(-45deg,#ff9a9e,#fad0c4,#fbc2eb,#a18cd1);
background-size:400% 400%;
animation:gradient 10s ease infinite;
}

@keyframes gradient{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.container{
padding:30px 15px;
}

h1{
font-size:8vw;
margin-bottom:20px;
animation:pop 2s infinite alternate;
}

@keyframes pop{
from{transform:scale(1)}
to{transform:scale(1.1)}
}

.message{
background:rgba(255,255,255,0.15);
padding:20px;
border-radius:15px;
font-size:4.5vw;
line-height:1.6;
max-width:500px;
margin:auto;
backdrop-filter:blur(6px);
}

button{
margin-top:25px;
padding:14px 25px;
font-size:5vw;
border:none;
border-radius:30px;
background:white;
color:#ff4081;
font-weight:bold;
cursor:pointer;
}

/* Floating stickers */

.sticker{
position:fixed;
font-size:7vw;
animation:float 10s linear infinite;
}

@keyframes float{
0%{
transform:translateY(100vh);
opacity:0;
}
20%{opacity:1}
100%{
transform:translateY(-10vh);
opacity:0;
}
}

/* Confetti */

.confetti{
position:fixed;
width:8px;
height:8px;
top:-10px;
animation:fall linear forwards;
}

@keyframes fall{
to{
transform:translateY(100vh) rotate(720deg);
}
}

footer{
margin-top:30px;
font-size:3.5vw;
opacity:0.9;
}

/* Desktop adjustments */

@media(min-width:700px){

h1{
font-size:50px;
}

.message{
font-size:20px;
}

button{
font-size:18px;
}

footer{
font-size:14px;
}

}

</style>
</head>

<body>

<div class="container">

<h1>Happy Friendship Day 🎉</h1>

<div class="message">
Friends are the family we choose ourselves.  
They fill our lives with laughter, memories, and endless support.  

💖 Thank you for being an amazing friend.  
🌟 May our friendship last forever!
</div>

<button onclick="celebrate()">Celebrate 🎊</button>

<footer>Made with ❤️ for Friendship</footer>

</div>

<script>

const emojis=["💖","🤝","🎉","✨","🌟","😊","💫","🥳"];

function createSticker(){

const sticker=document.createElement("div");
sticker.className="sticker";
sticker.innerText=emojis[Math.floor(Math.random()*emojis.length)];

sticker.style.left=Math.random()*100+"vw";
sticker.style.animationDuration=(6+Math.random()*5)+"s";

document.body.appendChild(sticker);

setTimeout(()=>{sticker.remove()},11000);
}

setInterval(createSticker,900);


/* Confetti */

function celebrate(){

for(let i=0;i<80;i++){

const confetti=document.createElement("div");
confetti.className="confetti";

confetti.style.left=Math.random()*100+"vw";
confetti.style.background=`hsl(${Math.random()*360},100%,50%)`;
confetti.style.animationDuration=(3+Math.random()*2)+"s";

document.body.appendChild(confetti);

setTimeout(()=>confetti.remove(),5000);

}

}

</script>

</body>
</html>
